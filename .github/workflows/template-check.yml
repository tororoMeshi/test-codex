name: Template Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect check mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          is_template="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.is_template')" || {
            echo "failed to detect repository template status"
            exit 1
          }

          case "$is_template" in
            true)
              echo "CHECK_MODE=template" >> "$GITHUB_ENV"
              ;;
            false)
              echo "CHECK_MODE=generated" >> "$GITHUB_ENV"
              ;;
            *)
              echo "unexpected is_template value: $is_template"
              exit 1
              ;;
          esac

      - name: Run template check
        run: bash scripts/check-template.sh "$CHECK_MODE"

      - name: Run generated check smoke test
        if: env.CHECK_MODE == 'template'
        run: bash scripts/smoke-test-generated.sh
