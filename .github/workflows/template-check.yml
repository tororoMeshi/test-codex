name: Template Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  template-check:
    runs-on: ubuntu-latest
    env:
      TEMPLATE_SOURCE_REPOSITORY: tororoMeshi/test-codex
    steps:
      - uses: actions/checkout@v4
      - name: Run template check
        run: |
          if [ "${GITHUB_REPOSITORY}" = "${TEMPLATE_SOURCE_REPOSITORY}" ]; then
            bash scripts/check-template.sh template
          else
            bash scripts/check-template.sh generated
          fi
