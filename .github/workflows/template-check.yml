name: Template Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect check mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}" --jq '.is_template' | grep -qx 'true'; then
            echo "CHECK_MODE=template" >> "$GITHUB_ENV"
          else
            echo "CHECK_MODE=generated" >> "$GITHUB_ENV"
          fi

      - name: Run template check
        run: bash scripts/check-template.sh "$CHECK_MODE"
